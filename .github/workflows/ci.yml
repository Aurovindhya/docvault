name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-java:
    name: Java Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: docvault_test
          POSTGRES_USER: docvault
          POSTGRES_PASSWORD: docvault_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Run tests
        working-directory: backend-java
        run: mvn -q test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/docvault_test
          SPRING_DATASOURCE_USERNAME: docvault
          SPRING_DATASOURCE_PASSWORD: docvault_secret

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        working-directory: backend-python
        run: pip install -r requirements.txt pytest httpx
      - name: Run tests
        working-directory: backend-python
        run: pytest -q

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npm run type-check
      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-java, test-python, lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
