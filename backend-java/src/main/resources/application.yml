spring:
  application:
    name: docvault-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docvault}
    username: ${SPRING_DATASOURCE_USERNAME:docvault}
    password: ${SPRING_DATASOURCE_PASSWORD:docvault_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change_me_in_production_use_long_random_string_at_least_256_bits}
    expiration-ms: 86400000  # 24 hours

  embeddings:
    service-url: ${EMBEDDINGS_SERVICE_URL:http://localhost:8000}
    chunk-size: 512       # characters per chunk
    chunk-overlap: 64     # overlap between chunks

logging:
  level:
    com.docvault: DEBUG
    org.springframework.security: INFO
